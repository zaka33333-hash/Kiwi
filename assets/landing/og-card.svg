<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Backdrop: Ink slab with subtle atlas+mint mesh -->
  <rect width="1200" height="630" fill="#02261C"/>

  <!-- Atmospheric atlas+mint mesh (bottom-right) -->
  <defs>
    <radialGradient id="meshAtlas" cx="78%" cy="62%" r="55%">
      <stop offset="0%" stop-color="#7DF2B0" stop-opacity="0.32"/>
      <stop offset="35%" stop-color="#0B6E4F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#02261C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshMint" cx="22%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#7DF2B0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#02261C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="numGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#7DF2B0"/>
    </linearGradient>
    <filter id="numGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#meshAtlas)"/>
  <rect width="1200" height="630" fill="url(#meshMint)"/>

  <!-- Top-left: Live pulse dot + brand pill -->
  <g transform="translate(80, 80)">
    <!-- Mint dot with glow -->
    <circle cx="14" cy="14" r="20" fill="#7DF2B0" opacity="0.18"/>
    <circle cx="14" cy="14" r="7" fill="#7DF2B0"/>
    <!-- "EN DIRECT · CONÇU À TANGER" mono pill text -->
    <text x="42" y="20"
          font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="15"
          font-weight="500"
          letter-spacing="2.4"
          fill="#7DF2B0">EN DIRECT · CONÇU À TANGER</text>
  </g>

  <!-- Top-right: kiwi wordmark -->
  <g transform="translate(1024, 64)">
    <rect x="0" y="0" width="44" height="44" rx="11" fill="#7DF2B0"/>
    <text x="22" y="32"
          font-family="Geist, system-ui, sans-serif"
          font-size="26"
          font-weight="500"
          fill="#0A0F0D"
          text-anchor="middle"
          letter-spacing="-1">k</text>
    <text x="56" y="32"
          font-family="Geist, system-ui, sans-serif"
          font-size="32"
          font-weight="500"
          fill="#F7F5F0"
          letter-spacing="-1.2">kiwi</text>
  </g>

  <!-- Center: massive headline -->
  <g transform="translate(80, 220)">
    <text x="0" y="0"
          font-family="Geist, system-ui, sans-serif"
          font-size="124"
          font-weight="500"
          fill="#F7F5F0"
          letter-spacing="-5">Encaisse à</text>
    <text x="0" y="138"
          font-family="Geist, system-ui, sans-serif"
          font-size="124"
          font-weight="500"
          fill="#F7F5F0"
          letter-spacing="-5">
      <tspan fill="#7DF2B0" filter="url(#numGlow)">T+1</tspan><tspan fill="#F7F5F0">,</tspan>
    </text>
    <text x="0" y="276"
          font-family="Geist, system-ui, sans-serif"
          font-size="124"
          font-weight="500"
          fill="rgba(247,245,240,0.55)"
          letter-spacing="-5">pas à T+5.</text>
  </g>

  <!-- Bottom rail: KPI strip -->
  <g transform="translate(80, 540)">
    <!-- Hairline divider above -->
    <rect x="0" y="-32" width="1040" height="1" fill="rgba(247,245,240,0.16)"/>

    <!-- KPI 1: 1,79% -->
    <g transform="translate(0, 0)">
      <text x="0" y="0"
            font-family="Geist, system-ui, sans-serif"
            font-size="34"
            font-weight="500"
            letter-spacing="-1"
            fill="#7DF2B0">1,79<tspan font-size="20" font-family="JetBrains Mono, ui-monospace, monospace" fill="rgba(247,245,240,0.55)" dx="4">%</tspan></text>
      <text x="0" y="24"
            font-family="JetBrains Mono, ui-monospace, monospace"
            font-size="13"
            font-weight="500"
            letter-spacing="1.2"
            fill="rgba(247,245,240,0.55)">TAUX FLAT TOUT INCLUS</text>
    </g>

    <!-- KPI 2: T+1 -->
    <g transform="translate(280, 0)">
      <text x="0" y="0"
            font-family="Geist, system-ui, sans-serif"
            font-size="34"
            font-weight="500"
            letter-spacing="-1"
            fill="#F7F5F0">T+1</text>
      <text x="0" y="24"
            font-family="JetBrains Mono, ui-monospace, monospace"
            font-size="13"
            font-weight="500"
            letter-spacing="1.2"
            fill="rgba(247,245,240,0.55)">VERSEMENT IBAN, 9 H</text>
    </g>

    <!-- KPI 3: 7 min -->
    <g transform="translate(540, 0)">
      <text x="0" y="0"
            font-family="Geist, system-ui, sans-serif"
            font-size="34"
            font-weight="500"
            letter-spacing="-1"
            fill="#F7F5F0">7<tspan font-size="20" font-family="JetBrains Mono, ui-monospace, monospace" fill="rgba(247,245,240,0.55)" dx="6">min</tspan></text>
      <text x="0" y="24"
            font-family="JetBrains Mono, ui-monospace, monospace"
            font-size="13"
            font-weight="500"
            letter-spacing="1.2"
            fill="rgba(247,245,240,0.55)">ONBOARDING BIOMÉTRIQUE</text>
    </g>

    <!-- KPI 4: 0 MAD -->
    <g transform="translate(800, 0)">
      <text x="0" y="0"
            font-family="Geist, system-ui, sans-serif"
            font-size="34"
            font-weight="500"
            letter-spacing="-1"
            fill="#F7F5F0">0<tspan font-size="20" font-family="JetBrains Mono, ui-monospace, monospace" fill="rgba(247,245,240,0.55)" dx="6">MAD</tspan></text>
      <text x="0" y="24"
            font-family="JetBrains Mono, ui-monospace, monospace"
            font-size="13"
            font-weight="500"
            letter-spacing="1.2"
            fill="rgba(247,245,240,0.55)">FRAIS CACHÉS. JAMAIS.</text>
    </g>
  </g>

  <!-- Right edge: editorial Instrument Serif italic ornament -->
  <text x="1120" y="350"
        font-family="Instrument Serif, Times New Roman, serif"
        font-style="italic"
        font-size="240"
        fill="rgba(125,242,176,0.06)"
        text-anchor="end"
        letter-spacing="-8">0</text>

  <!-- Hairline frame -->
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="rgba(125,242,176,0.18)" stroke-width="1"/>
</svg>
